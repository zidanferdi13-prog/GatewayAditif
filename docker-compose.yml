# =============================================================================
# AMA Timbangan Aditif — Docker Compose
#
# Services
#   app    — Node.js backend + React frontend (single image)
#   mysql  — MySQL 8.0 database (auto-initialised from schema.sql)
#
# Quick start
#   1. cp .env.example .env          # edit passwords + serial port paths
#   2. docker compose up --build -d
#   3. Open http://localhost:3000
#
# ⚠  WINDOWS SERIAL PORT NOTE ──────────────────────────────────────────────
#   Docker Desktop on Windows uses a WSL2 (Linux) backend.  COM ports are
#   NOT automatically passed through to Linux containers.
#
#   Options:
#     A) usbipd-win  — attach a USB–serial adapter via USB/IP then map as
#                      /dev/ttyUSBx inside the container.
#     B) socat bridge — inside WSL2: socat PTY,link=/dev/ttyS0 TCP:host:port
#     C) Windows Containers — switch Docker Desktop to "Windows containers"
#                             mode (requires different base image, more work).
#
#   To enable serial pass-through once the device is visible as a Linux path,
#   uncomment the `devices:` block under the `app` service below.
# =============================================================================

services:

  # ── Application (backend + frontend) ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ama-timbangan:latest
    container_name: ama-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_DIR: /app/public

      # Serial ports (Linux paths — adjust after bridging COM ports, see above)
      SERIAL_SMALL_PORT: /dev/ttyS0
      SERIAL_SMALL_BAUD_RATE: "9600"
      SERIAL_LARGE_PORT: /dev/ttyS1
      SERIAL_LARGE_BAUD_RATE: "9600"

      # Database — values come from .env file
      DB_HOST: mysql
      DB_USER: ${DB_USER:-amauser}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-amanerve_loadcell}
      DB_CONNECTION_LIMIT: "10"

      # External API
      KANBAN_API_URL: ${KANBAN_API_URL:-https://services.ama.id/kanban}

    # ── Serial device pass-through (uncomment when devices are available) ──
    # devices:
    #   - "/dev/ttyS0:/dev/ttyS0"   # small scale  (was COM1)
    #   - "/dev/ttyS1:/dev/ttyS1"   # large scale  (was COM2)
    # privileged: true               # needed if udev rules block access

    volumes:
      - ./logs:/app/logs

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - ama-net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── MySQL 8.0 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ama-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-amanerve_loadcell}
      MYSQL_USER: ${DB_USER:-amauser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      # Expose only on localhost — remove this line in production if external
      # DB access is not needed.
      - "127.0.0.1:3306:3306"
    volumes:
      # Persistent database data
      - mysql-data:/var/lib/mysql
      # Auto-initialise schema on first run (only runs when data volume is empty)
      - ./backend/database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ama-net

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ama-net:
    driver: bridge
